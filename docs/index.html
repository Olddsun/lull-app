<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drzzl — Ambient Sound Player</title>
  <meta name="description" content="A calm ambient sound player for macOS and iPhone. Mix six sounds, set a sleep timer, and let Auto mode do the rest." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface:         '#09090B',
            card:            '#111113',
            'card-hover':    '#16161A',
            border:          '#1E1E26',
            'border-soft':   '#282832',
            muted:           '#52525B',
            warm:            '#F0EBE1',
            'warm-muted':    '#9C9589',
            accent:          '#5A8F6A',
            'accent-dim':    '#3E6B4E',
            'accent-bg':     '#0C1A0F',
            'accent-border': '#1E3A24',
          },
          fontFamily: {
            serif: ['Lora', 'Georgia', 'serif'],
            sans:  ['Raleway', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    html { scroll-behavior: smooth; }
    body { background-color: #09090B; }

    /* ── Nav glass ── */
    .nav-glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(9,9,11,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* ── Bento grid ── */
    /* Mobile-first: single column */
    .bento {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    /* Tablet (md): 2-col */
    @media (min-width: 768px) {
      .bento { grid-template-columns: repeat(2, 1fr); }
      .md-span-2 { grid-column: span 2; }
    }
    /* Desktop (lg): 3-col */
    @media (min-width: 1024px) {
      .bento { grid-template-columns: repeat(3, 1fr); }
      .lg-span-2 { grid-column: span 2; }
      .lg-span-3 { grid-column: 1 / -1; }
    }

    /* ── Bento card ── */
    .bento-card {
      border-radius: 18px;
      padding: 22px;
      border: 1px solid #1E1E26;
      background: #111113;
      /* Touch active feedback */
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      overflow: hidden;
      cursor: default;
    }
    @media (min-width: 1024px) {
      .bento-card { padding: 28px; border-radius: 20px; }
    }
    /* Desktop hover */
    @media (hover: hover) {
      .bento-card:hover { border-color: #2A2A36; background: #16161A; }
      .bento-card.pro:hover { border-color: #2A4A32; background: #111A13; }
    }
    /* Touch active press */
    .bento-card:active { transform: scale(0.985); }
    .bento-card.pro { border-color: #1E3A24; background: #0D1512; }

    /* ── Strip cards → full card on mobile ── */
    .strip-card { padding-top: 22px; padding-bottom: 22px; }
    @media (max-width: 1023px) {
      .strip-card { min-height: 100px; }
    }
    @media (min-width: 1024px) {
      .strip-card { padding-top: 20px; padding-bottom: 20px; }
    }

    /* ── Video glow ── */
    .video-glow {
      box-shadow: 0 0 60px -10px rgba(90,143,106,0.12), 0 30px 80px -15px rgba(0,0,0,0.85);
    }

    /* ── Pro card glow ── */
    .pro-card-glow {
      box-shadow: 0 0 80px -30px rgba(90,143,106,0.2);
    }

    /* ── Waveform animation ── */
    .wave-bar {
      transform-origin: bottom;
      animation: waveAnim 1.4s ease-in-out infinite;
    }
    .wave-bar:nth-child(1)  { animation-delay:0s;    animation-duration:1.2s; }
    .wave-bar:nth-child(2)  { animation-delay:0.18s; animation-duration:1.5s; }
    .wave-bar:nth-child(3)  { animation-delay:0.34s; animation-duration:1.1s; }
    .wave-bar:nth-child(4)  { animation-delay:0.5s;  animation-duration:1.6s; }
    .wave-bar:nth-child(5)  { animation-delay:0.22s; animation-duration:1.3s; }
    .wave-bar:nth-child(6)  { animation-delay:0.42s; animation-duration:1.4s; }
    .wave-bar:nth-child(7)  { animation-delay:0.1s;  animation-duration:1.1s; }
    .wave-bar:nth-child(8)  { animation-delay:0.6s;  animation-duration:1.5s; }
    .wave-bar:nth-child(9)  { animation-delay:0.26s; animation-duration:1.3s; }
    .wave-bar:nth-child(10) { animation-delay:0.44s; animation-duration:1.5s; }
    .wave-bar:nth-child(11) { animation-delay:0.08s; animation-duration:1.2s; }
    .wave-bar:nth-child(12) { animation-delay:0.55s; animation-duration:1.4s; }
    @keyframes waveAnim {
      0%,100% { transform: scaleY(0.2); }
      50%      { transform: scaleY(1);   }
    }
    @media (prefers-reduced-motion: reduce) {
      .wave-bar { animation: none; transform: scaleY(0.5); }
    }

    /* ── Mini sliders ── */
    .mini-track { background: #1E1E26; border-radius: 2px; height: 3px; position: relative; }
    .mini-fill  { background: #5A8F6A; border-radius: 2px; height: 3px; position: absolute; left:0; top:0; }
    .mini-thumb {
      width: 10px; height: 10px; border-radius: 50%;
      background: #F0EBE1; border: 1.5px solid #5A8F6A;
      position: absolute; top: 50%; transform: translate(-50%,-50%);
    }

    /* ── Lang toggle ── */
    .lang-btn { transition: color 0.15s; }
    .lang-btn.active { color: #5A8F6A; font-weight: 600; }

    /* ── Sticky CTA bar (mobile only) ── */
    .sticky-cta {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 40;
      background: rgba(9,9,11,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #1E1E26;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      transition: transform 0.3s ease;
    }
    .sticky-cta.hidden-bar { transform: translateY(110%); }
    /* Hide on desktop */
    @media (min-width: 768px) { .sticky-cta { display: none; } }

    /* Body safe area bottom on mobile */
    @media (max-width: 767px) {
      body { padding-bottom: 80px; }
    }

    /* ── Section divider label ── */
    .section-rule {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .section-rule-line { flex: 1; height: 1px; background: #1E1E26; }
    .section-rule-line.pro { background: #1E3A24; }
  </style>
</head>

<body class="font-sans text-warm antialiased">

<script>
  // ── Lang toggle ──
  function setLang(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-en]').forEach(el => {
      el.innerHTML = el.getAttribute('data-' + lang);
    });
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
  }
  setLang('en');

  // ── Sticky CTA: hide when footer is visible ──
  const stickyCta = document.getElementById('stickyCta');
  const footer    = document.getElementById('footer');

  if (stickyCta && footer && window.innerWidth < 768) {
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          stickyCta.classList.add('hidden-bar');
        } else {
          stickyCta.classList.remove('hidden-bar');
        }
      },
      { threshold: 0.1 }
    );
    observer.observe(footer);
  }
</script>
