<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lull — Ambient Sound Player</title>
  <meta name="description" content="A calm ambient sound player for macOS and iPhone. Mix six sounds, set a sleep timer, and let Auto mode do the rest." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface:        '#09090B',
            card:           '#111113',
            'card-hover':   '#16161A',
            border:         '#1E1E26',
            'border-soft':  '#282832',
            muted:          '#52525B',
            warm:           '#F0EBE1',
            'warm-muted':   '#9C9589',
            accent:         '#5A8F6A',
            'accent-dim':   '#3E6B4E',
            'accent-bg':    '#0C1A0F',
            'accent-border':'#1E3A24',
          },
          fontFamily: {
            serif: ['Lora', 'Georgia', 'serif'],
            sans:  ['Raleway', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    body { background-color: #09090B; }

    /* Bento grid */
    .bento {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .bento-card {
      border-radius: 20px;
      padding: 28px;
      border: 1px solid #1E1E26;
      background: #111113;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
    }
    .bento-card:hover {
      border-color: #2A2A36;
      background: #16161A;
    }
    .bento-card.pro {
      border-color: #1E3A24;
      background: #0D1512;
    }
    .bento-card.pro:hover {
      border-color: #2A4A32;
      background: #111A13;
    }
    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: 1 / -1; }

    /* Nav glass */
    .nav-glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(9,9,11,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Video glow */
    .video-glow {
      box-shadow: 0 0 80px -10px rgba(90,143,106,0.15), 0 40px 100px -20px rgba(0,0,0,0.9);
    }

    /* Pro card glow */
    .pro-card-glow {
      box-shadow: 0 0 100px -30px rgba(90,143,106,0.25);
    }

    /* Waveform animation */
    .wave-bar {
      transform-origin: bottom;
      animation: waveAnim 1.4s ease-in-out infinite;
    }
    .wave-bar:nth-child(1){ animation-delay:0s;    animation-duration:1.2s; }
    .wave-bar:nth-child(2){ animation-delay:0.18s; animation-duration:1.5s; }
    .wave-bar:nth-child(3){ animation-delay:0.34s; animation-duration:1.1s; }
    .wave-bar:nth-child(4){ animation-delay:0.5s;  animation-duration:1.6s; }
    .wave-bar:nth-child(5){ animation-delay:0.22s; animation-duration:1.3s; }
    .wave-bar:nth-child(6){ animation-delay:0.42s; animation-duration:1.4s; }
    .wave-bar:nth-child(7){ animation-delay:0.1s;  animation-duration:1.1s; }
    .wave-bar:nth-child(8){ animation-delay:0.6s;  animation-duration:1.5s; }
    @keyframes waveAnim {
      0%,100% { transform: scaleY(0.25); }
      50%      { transform: scaleY(1);    }
    }
    @media (prefers-reduced-motion: reduce) {
      .wave-bar { animation: none; transform: scaleY(0.5); }
    }

    /* Slider mini */
    .mini-track { background: #1E1E26; border-radius: 2px; height: 3px; position: relative; }
    .mini-fill  { background: #5A8F6A; border-radius: 2px; height: 3px; position: absolute; left:0; top:0; }
    .mini-thumb {
      width: 10px; height: 10px; border-radius: 50%;
      background: #F0EBE1; border: 1.5px solid #5A8F6A;
      position: absolute; top: 50%; transform: translate(-50%,-50%);
    }

    /* Responsive bento */
    @media (max-width: 767px) {
      .bento { grid-template-columns: 1fr; }
      .span-2, .span-3 { grid-column: 1; }
      .bento-card { padding: 22px; }
    }
    @media (min-width: 768px) and (max-width: 1023px) {
      .bento { grid-template-columns: repeat(2, 1fr); }
      .span-3 { grid-column: 1 / -1; }
    }

    /* Lang button */
    .lang-btn { transition: color 0.15s; }
    .lang-btn.active { color: #5A8F6A; font-weight: 600; }

    /* Smooth scroll */
    html { scroll-behavior: smooth; }
  </style>
</head>

<script>
  function setLang(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-en]').forEach(el => {
      el.innerHTML = el.getAttribute('data-' + lang);
    });
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
