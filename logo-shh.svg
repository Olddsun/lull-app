<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pacifico&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#1A1A22"/>

  <!-- Subtle noise texture overlay (very subtle radial gradient for depth) -->
  <radialGradient id="depth" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#252530"/>
    <stop offset="100%" stop-color="#1A1A22"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#depth)"/>

  <!-- "shh" text -->
  <text
    x="512"
    y="590"
    text-anchor="middle"
    font-family="Pacifico, 'Dancing Script', cursive"
    font-size="310"
    fill="#F0EBE1"
    letter-spacing="-8"
  >shh</text>
</svg>
