<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drzzl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-wrapper" style="position:relative">

  <!-- Title bar -->
  <div class="titlebar" id="dragArea">
    <div class="window-controls">
      <button id="collapseBtn" class="ctrl-btn collapse" title="Collapse">▲</button>
      <button id="minimizeBtn" class="ctrl-btn minimize">─</button>
      <button id="closeBtn"    class="ctrl-btn close">✕</button>
    </div>
    <span class="app-title">Drzzl</span>
  </div>

  <!-- Body -->
  <div class="container">

    <!-- Play row -->
    <div class="main-control">
      <button id="playBtn" class="play-btn" title="Play / Pause">▶</button>
      <span id="playLabel" class="play-label">Paused</span>
      <button id="timerBtn" class="timer-btn" title="Sleep timer">
        <svg viewBox="0 0 12 12" fill="none" stroke-width="1.4" stroke-linecap="round">
          <circle cx="6" cy="6.5" r="4.5"/>
          <path d="M6 4.5v2l1.5 1"/>
          <path d="M4 1.5h4M6 1.5v1"/>
        </svg>
      </button>
      <div class="spacer"></div>
      <label class="auto-toggle" title="Auto mode">
        <input type="checkbox" id="autoMode">
        <span>Auto</span>
      </label>
    </div>

    <!-- Mix section -->
    <div class="sounds">
      <span class="section-label">Mix</span>

      <div class="sound-row" data-sound="rain">
        <span class="sound-icon">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="1.5" stroke-linecap="round">
            <path d="M2 3.5 Q6 1 10 3.5"/>
            <line x1="3"   y1="6.5" x2="2.5" y2="8.5"/>
            <line x1="6"   y1="7"   x2="5.5" y2="9.5"/>
            <line x1="9"   y1="6.5" x2="8.5" y2="8.5"/>
          </svg>
        </span>
        <span class="sound-label">Rain</span>
        <div class="slider-wrap">
          <div class="slider-track-bg"></div>
          <div class="slider-fill" id="rain-fill" style="width:60%"></div>
          <input type="range" class="slider" id="rain-slider" min="0" max="100" value="60">
        </div>
        <span class="vol-num" id="rain-vol">60</span>
      </div>

      <div class="sound-row" data-sound="wind">
        <span class="sound-icon">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 5   Q4 3.5 7 5   Q9 6   10.5 4.5"/>
            <path d="M1 7.5 Q4 6   7 7.5 Q8.5 8.5 8.5 9.5"/>
          </svg>
        </span>
        <span class="sound-label">Wind</span>
        <div class="slider-wrap">
          <div class="slider-track-bg"></div>
          <div class="slider-fill" id="wind-fill" style="width:30%"></div>
          <input type="range" class="slider" id="wind-slider" min="0" max="100" value="30">
        </div>
        <span class="vol-num" id="wind-vol">30</span>
      </div>

      <div class="sound-row" data-sound="birds">
        <span class="sound-icon">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="1.4" stroke-linecap="round">
            <path d="M1.5 7.5 Q3 5 5 6 Q6 6.5 7 5.5 Q8.5 4 10.5 5"/>
            <path d="M1.5 5   Q3 3 5 4"/>
          </svg>
        </span>
        <span class="sound-label">Birds</span>
        <div class="slider-wrap">
          <div class="slider-track-bg"></div>
          <div class="slider-fill" id="birds-fill" style="width:20%"></div>
          <input type="range" class="slider" id="birds-slider" min="0" max="100" value="20">
        </div>
        <span class="vol-num" id="birds-vol">20</span>
      </div>

      <div class="sound-row" data-sound="fire">
        <span class="sound-icon">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 10.5 C3 10.5 2 8.5 3 7 C3.5 6 3 5 4 4 C4 5.5 5 6 5.5 5 C6 4 7.5 2 6.5 1 C8.5 2 9.5 5 8.5 7 C9.5 6 9.5 5 9.5 5 C10.5 6.5 10 8.5 8.5 9.5"/>
          </svg>
        </span>
        <span class="sound-label">Fire</span>
        <div class="slider-wrap">
          <div class="slider-track-bg"></div>
          <div class="slider-fill" id="fire-fill" style="width:0%"></div>
          <input type="range" class="slider" id="fire-slider" min="0" max="100" value="0">
        </div>
        <span class="vol-num" id="fire-vol">0</span>
      </div>

      <div class="sound-row" data-sound="waves">
        <span class="sound-icon">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="1.4" stroke-linecap="round">
            <path d="M1 5   Q2.5 3.5 4 5   Q5.5 6.5 7 5   Q8.5 3.5 10.5 5"/>
            <path d="M1 7.5 Q2.5 6   4 7.5 Q5.5 9   7 7.5 Q8.5 6   10.5 7.5"/>
          </svg>
        </span>
        <span class="sound-label">Waves</span>
        <div class="slider-wrap">
          <div class="slider-track-bg"></div>
          <div class="slider-fill" id="waves-fill" style="width:0%"></div>
          <input type="range" class="slider" id="waves-slider" min="0" max="100" value="0">
        </div>
        <span class="vol-num" id="waves-vol">0</span>
      </div>

      <div class="sound-row" data-sound="cafe">
        <span class="sound-icon">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.5 5 h5.5 l-0.8 4.5 H3.3 Z"/>
            <path d="M8 6.5 Q10.5 6.5 10.5 8 Q10.5 9 8.5 9"/>
            <path d="M4 3.5 Q4.5 2.5 4 1.5"/>
            <path d="M6 3.5 Q6.5 2.5 6 1.5"/>
          </svg>
        </span>
        <span class="sound-label">Café</span>
        <div class="slider-wrap">
          <div class="slider-track-bg"></div>
          <div class="slider-fill" id="cafe-fill" style="width:0%"></div>
          <input type="range" class="slider" id="cafe-slider" min="0" max="100" value="0">
        </div>
        <span class="vol-num" id="cafe-vol">0</span>
      </div>

      <!-- Custom sounds inserted here dynamically -->
      <div id="customSoundsAnchor"></div>

      <!-- Import button -->
      <div class="import-row" id="importRow">
        <button class="add-sound-btn" id="addSoundBtn" title="Import audio file">
          <svg viewBox="0 0 10 10" fill="none" stroke-width="1.6" stroke-linecap="round">
            <line x1="5" y1="1.5" x2="5" y2="8.5"/>
            <line x1="1.5" y1="5" x2="8.5" y2="5"/>
          </svg>
        </button>
        <span class="import-label" id="importLabel">Import sound</span>
      </div>

    </div><!-- /sounds -->

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Scenes -->
    <div class="presets">
      <div class="scenes-header">
        <span class="section-label">Scenes</span>
        <button class="add-scene-btn" id="addSceneBtn" title="Save current mix as scene">
          <svg viewBox="0 0 10 10" fill="none" stroke-width="1.6" stroke-linecap="round">
            <line x1="5" y1="1.5" x2="5" y2="8.5"/>
            <line x1="1.5" y1="5" x2="8.5" y2="5"/>
          </svg>
        </button>
      </div>
      <div class="scene-name-input" id="sceneNameInput" style="display:none">
        <input type="text" id="sceneNameField" placeholder="Scene name…" maxlength="16">
        <button id="sceneNameSave">Save</button>
      </div>
      <div class="preset-btns" id="presetBtns">
        <button class="preset" data-preset="forest">Forest</button>
        <button class="preset" data-preset="rain">Rainy Night</button>
        <button class="preset" data-preset="cafe">Café</button>
        <button class="preset" data-preset="beach">Beach</button>
      </div>
      <div class="preset-btns custom-preset-btns" id="customPresetBtns"></div>
    </div>

  </div><!-- /container -->
</div><!-- /app-wrapper -->

<!-- Pro upgrade sheet -->
<div class="pro-sheet" id="proSheet">
  <button class="pro-sheet-close" id="proSheetClose">✕</button>
  <div class="pro-glyph">✦</div>
  <div class="pro-title">Drzzl Pro</div>
  <ul class="pro-list">
    <li>Auto mode</li>
    <li>Import custom sounds</li>
  </ul>
  <button class="pro-buy-btn" id="proBuyBtn">Unlock — $2.99</button>
  <button class="pro-restore-btn" id="proRestoreBtn">Restore Purchase</button>
</div>

<script src="renderer.js"></script>
</body>
</html>
